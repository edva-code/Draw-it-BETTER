name: Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Frontend ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: draw.it.client
        run: |
          npm ci
          npm run build

      - name: Copy frontend to backend
        run: |
          rm -rf Draw.it.Server/wwwroot/*
          mkdir -p Draw.it.Server/wwwroot/
          cp -r draw.it.client/dist/* Draw.it.Server/wwwroot/

      # ---------- Backend ----------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish backend
        run: |
          dotnet publish Draw.it.Server \
            -c Release \
            -o publish

      # ---------- Deploy ----------
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: publish
